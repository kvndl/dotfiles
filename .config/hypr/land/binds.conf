# =====================================
# Hyprland [Binds] Configuration
# =====================================

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
#$menu = walker -s catppuccin -m applications
$locker = sh -c '(sleep 0.5s; swaylock)' & disown
$clipboard = copyq menu
$screenshot = hyprshot --clipboard-only -m region
$fullscreen = hyprctl dispatch fullscreen 0
$fullscreenkeepbar = hyprctl dispatch fullscreen 1
$barnuke = killall -SIGUSR2 waybar

# -------------------------------------
# Key Bindings
# -------------------------------------

bind = Control_L&Super_L&Alt_L, space, exec, $terminal
bind = SUPER&SHIFT, Q, killactive,
bind = SUPER&SHIFT, M, exit,
bind = SUPER&SHIFT, R, exec, $barnuke
bind = SUPER, E, exec, $fileManager
bind = SUPER, F, exec, $fullscreenkeepbar
bind = SUPER&SHIFT, F, exec, $fullscreen
bind = SUPER&SHIFT, L, exec, $locker
bind = SUPER&Alt_L, space, togglefloating,
bind = SUPER, Space, exec, $menu
bind = SUPER, P, pseudo,
bind = SUPER, J, togglesplit,
bind = SUPER, V, exec, $clipboard
bind = Control_L&Shift_L, space, exec, 1password --quick-access
bind = SUPER&SHIFT, S, exec, $screenshot
bind = SUPER&Shift_L, A, exec, swaync-client -t -sw
bind = Control_L&Alt_L, Delete, exec, hyprctl dispatch exit

# -------------------------------------
# Media Controls
# -------------------------------------
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

# -------------------------------------
# Focus Management
# -------------------------------------

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# -------------------------------------
# Workspace Management
# -------------------------------------

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move Active Windows to Specific Workspaces
bind = SUPER&SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER&SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER&SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER&SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER&SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER&SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER&SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER&SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER&SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER&SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces on the current monitor
bind = SUPER, mouse_down, exec, ~/.config/hypr/bin/scroll_workspace down
bind = SUPER, mouse_up, exec, ~/.config/hypr/bin/scroll_workspace up

# Add a new workspace on the current monitor
bind = SUPER, N, exec, ~/.config/hypr/bin/new_workspace

# -------------------------------------
# Window Movement and Resizing
# -------------------------------------

# Move / Resize window with left/right mouse button
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Swap windows
bind = SUPER&Alt_L, left, swapwindow, l
bind = SUPER&Alt_L, right, swapwindow, r
bind = SUPER&Alt_L, up, swapwindow, u
bind = SUPER&Alt_L, down, swapwindow, d
